<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Paulogdm personal page. Make yourself at home. Twitter, GitHub and StackOverflow profiles.">
  <meta name="author" content="paulogdm">

  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/assets/favicon-48.png" sizes="48x48" type="image/png">
  <link rel="icon" href="/assets/favicon-62.png" sizes="62x62" type="image/png">
  <link rel="apple-touch-icon" href="/assets/favicon-192.png" sizes="192x192">

  <link rel="preload" href="/vendor/fonts/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/vendor/fonts/syne-latin-400.woff2" as="font" type="font/woff2" crossorigin>

<link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/vendor/fonts.css">

  <script>
    (function () {
      var m = document.cookie.match(/(^| )lights=([^;]+)/);
      var dark = m ? m[2] === 'on' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.add(dark ? 'theme-dark' : 'theme-light');
    })();
  </script>

  %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
